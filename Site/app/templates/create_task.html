<h1>Crea un nuevo pedido</h1>
    <div class="contenedor_fomulario">
        <form method="post">
    {% csrf_token%}
    <h2>ingresa el producto</h2>
    {{ form.Product}}
    <h2 class="h_descripcion">ingresa la descripcion del pedido</h2>
    {{ form.descripcion }}
    <p>
        {{ form.estado }}
    </p>
<div class="botton">
    <button>Crear</button>
    <label for="c">
        <div class="cancelar" id="c">
        <a href="{% url 'home' %}" class="">Cancelar</a>
    </div>
    </label>


    <style>
         *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .h_descripcion{
            margin-top: 20px;
        }

        .botton{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 100px;
        }
        .contenedor_fomulario{
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 900px;
        }
        .Product{
            width: 400px;
            height: 40px;
            margin-top: 20px;
            border: 5px solid black;
            border-radius: 20px;
            padding: 20px;
        }
        button{
            padding: 10px;
            width: 200px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background-color: red;
            color: white;
            margin-top: 40px;
        }
        
        .cancelar{
            padding: 10px;
            width: 200px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background-color: red;
            color: white;
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        a{
            text-decoration: none;
            color: white;
        }

        .descripcion{
            padding: 20px;
            margin-top: 20px;
            width: 500px;
            height: 500px;
            border: 5px solid black;
            border-radius: 20px;
        }
    </style>
</form>
